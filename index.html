<!DOCTYPE html>
<html>
<head>
    <title>Puzzled</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #2b0033 0%, #050005 45%, #000000 100%);
            font-family: "Times New Roman", serif;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            perspective: 900px;
        }

        .piece {
            position: absolute;
            top: -350px;
            width: 180px;
            height: 180px;
            background: linear-gradient(
                135deg,
                #ffffff 0%,
                #777777 18%,
                #f5f5f5 35%,
                #2e2e2e 50%,
                #d8d8d8 68%,
                #ffffff 82%,
                #5c5c5c 100%
            );
            border-radius: 22px;
            box-shadow:
                inset -12px -12px 25px rgba(0,0,0,0.55),
                inset 12px 12px 25px rgba(255,255,255,0.65),
                0 0 25px rgba(255,255,255,0.35),
                0 0 55px rgba(168,85,247,0.45);
            animation: fall3d linear infinite;
            opacity: 0.78;
        }

        .piece::before,
        .piece::after {
            content: "";
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: inherit;
            box-shadow:
                inset -8px -8px 18px rgba(0,0,0,0.45),
                inset 8px 8px 18px rgba(255,255,255,0.6);
        }

        .piece::before {
            top: 55px;
            right: -35px;
        }

        .piece::after {
            bottom: -35px;
            left: 55px;
        }

        .cutout {
            position: absolute;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: radial-gradient(circle at center, #050005 0%, #000000 70%);
            top: 54px;
            left: -36px;
            box-shadow:
                inset 10px 10px 20px rgba(0,0,0,0.9),
                inset -6px -6px 12px rgba(255,255,255,0.15);
        }

        .piece:nth-child(1) { left: 2%; width: 230px; height: 230px; animation-duration: 34s; }
        .piece:nth-child(2) { left: 18%; width: 270px; height: 270px; animation-duration: 42s; animation-delay: 4s; }
        .piece:nth-child(3) { left: 36%; width: 220px; height: 220px; animation-duration: 38s; animation-delay: 7s; }
        .piece:nth-child(4) { left: 53%; width: 300px; height: 300px; animation-duration: 47s; animation-delay: 2s; }
        .piece:nth-child(5) { left: 72%; width: 250px; height: 250px; animation-duration: 40s; animation-delay: 5s; }
        .piece:nth-child(6) { left: 86%; width: 280px; height: 280px; animation-duration: 45s; animation-delay: 9s; }

        @keyframes fall3d {
            0% {
                transform: translateY(-400px) rotateX(20deg) rotateY(0deg) rotateZ(0deg);
            }
            50% {
                transform: translateY(55vh) rotateX(180deg) rotateY(220deg) rotateZ(90deg);
            }
            100% {
                transform: translateY(130vh) rotateX(360deg) rotateY(420deg) rotateZ(180deg);
            }
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        .chrome-text {
            color: transparent;
            background: linear-gradient(
                120deg,
                #ffffff 0%,
                #bfbfbf 20%,
                #ffffff 40%,
                #6e6e6e 60%,
                #ffffff 80%,
                #a0a0a0 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
        }

        h1 {
            font-size: 100px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-weight: 400;
            text-shadow:
                0 0 8px rgba(255,255,255,0.4),
                0 0 18px rgba(168,85,247,0.35);
        }

        h2 {
            margin-top: 20px;
            font-family: Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        p {
            margin-top: 35px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .button {
            margin-top: 45px;
            padding: 18px 55px;
            border: 1px solid #cfcfcf;
            font-family: Arial, sans-serif;
            letter-spacing: 4px;
            text-decoration: none;
            text-transform: uppercase;
            background: rgba(255,255,255,0.05);
        }

        .links {
            margin-top: 50px;
            font-family: Arial, sans-serif;
        }

        .links a {
            margin: 0 20px;
            text-decoration: none;
            letter-spacing: 4px;
            font-size: 13px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 55px;
            }

            .piece {
                width: 160px !important;
                height: 160px !important;
            }
        }
    </style>
</head>

<body>

    <div class="background">
        <div class="piece"><div class="cutout"></div></div>
        <div class="piece"><div class="cutout"></div></div>
        <div class="piece"><div class="cutout"></div></div>
        <div class="piece"><div class="cutout"></div></div>
        <div class="piece"><div class="cutout"></div></div>
        <div class="piece"><div class="cutout"></div></div>
    </div>

    <div class="content">
        <h1 class="chrome-text">Puzzled</h1>
        <h2 class="chrome-text">Not broken. Just different.</h2>
        <p class="chrome-text">Autism awareness streetwear.</p>

        <a class="button chrome-text" href="#">First Drop Coming Soon</a>

        <div class="links">
            <a class="chrome-text" href="#">Instagram</a>
            <a class="chrome-text" href="#">TikTok</a>
        </div>
    </div>

</body>
</html>
