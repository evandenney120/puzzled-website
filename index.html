<!DOCTYPE html>
<html>
<head>
    <title>Puzzled</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 45%, rgba(115, 0, 160, 0.5), transparent 32%),
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 20%),
                linear-gradient(135deg, #000000 0%, #09000d 45%, #1b0026 100%);
            font-family: "Times New Roman", serif;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            perspective: 1200px;
        }

        .piece {
            position: absolute;
            top: -420px;
            width: 330px;
            height: 330px;
            opacity: 0.72;
            transform-style: preserve-3d;

            background:
                linear-gradient(115deg,
                    #ffffff 0%,
                    #818181 12%,
                    #f7f7f7 25%,
                    #2a2a2a 39%,
                    #f1f1f1 52%,
                    #777777 65%,
                    #ffffff 78%,
                    #3b3b3b 100%);

            clip-path: polygon(
                28% 0%, 72% 0%,
                72% 18%, 84% 18%, 84% 31%, 72% 31%,
                72% 100%, 28% 100%,
                28% 72%, 16% 72%, 16% 59%, 28% 59%,
                28% 0%
            );

            box-shadow:
                inset 18px 18px 35px rgba(255,255,255,0.7),
                inset -22px -22px 40px rgba(0,0,0,0.75),
                0 0 35px rgba(255,255,255,0.35),
                0 0 85px rgba(168,85,247,0.5);

            animation: fall3d linear infinite, chromePulse 5s ease-in-out infinite;
        }

        .piece::before {
            content: "";
            position: absolute;
            width: 34%;
            height: 34%;
            border-radius: 50%;
            top: 33%;
            right: -17%;
            background: inherit;
            box-shadow:
                inset 10px 10px 22px rgba(255,255,255,0.6),
                inset -12px -12px 25px rgba(0,0,0,0.65);
        }

        .piece::after {
            content: "";
            position: absolute;
            width: 34%;
            height: 34%;
            border-radius: 50%;
            left: -17%;
            top: 33%;
            background: #050005;
            box-shadow:
                inset 8px 8px 20px rgba(0,0,0,0.95),
                inset -5px -5px 12px rgba(255,255,255,0.16);
        }

        .piece span {
            position: absolute;
            width: 34%;
            height: 34%;
            border-radius: 50%;
            bottom: -17%;
            left: 33%;
            background: inherit;
            box-shadow:
                inset 10px 10px 22px rgba(255,255,255,0.6),
                inset -12px -12px 25px rgba(0,0,0,0.65);
        }

        .piece:nth-child(1) { left: -4%;  width: 360px; height: 360px; animation-duration: 34s; animation-delay: 0s; }
        .piece:nth-child(2) { left: 15%;  width: 420px; height: 420px; animation-duration: 42s; animation-delay: 5s; }
        .piece:nth-child(3) { left: 38%;  width: 350px; height: 350px; animation-duration: 39s; animation-delay: 9s; }
        .piece:nth-child(4) { left: 58%;  width: 460px; height: 460px; animation-duration: 48s; animation-delay: 2s; }
        .piece:nth-child(5) { left: 80%;  width: 390px; height: 390px; animation-duration: 44s; animation-delay: 7s; }

        @keyframes fall3d {
            0% {
                transform: translateY(-450px) rotateX(15deg) rotateY(0deg) rotateZ(0deg);
            }
            50% {
                transform: translateY(55vh) rotateX(120deg) rotateY(180deg) rotateZ(80deg);
            }
            100% {
                transform: translateY(135vh) rotateX(250deg) rotateY(360deg) rotateZ(160deg);
            }
        }

        @keyframes chromePulse {
            0%, 100% {
                filter: brightness(1) contrast(1.15);
            }
            50% {
                filter: brightness(1.45) contrast(1.35);
            }
        }

        .content {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 35px;
            background: rgba(0,0,0,0.15);
        }

        .chrome-text {
            color: transparent;
            background: linear-gradient(
                120deg,
                #ffffff 0%,
                #d7d7d7 16%,
                #777777 31%,
                #ffffff 48%,
                #5e5e5e 64%,
                #f4f4f4 82%,
                #a6a6a6 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
        }

        h1 {
            font-size: 110px;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 400;
            line-height: 1;
            text-shadow:
                0 0 2px rgba(255,255,255,0.65),
                0 0 14px rgba(168,85,247,0.45);
        }

        h2 {
            margin-top: 22px;
            font-family: Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 7px;
            text-transform: uppercase;
            font-weight: 400;
        }

        p {
            margin-top: 34px;
            font-family: Arial, sans-serif;
            font-size: 15px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .button {
            margin-top: 46px;
            padding: 18px 58px;
            border: 1px solid rgba(230,230,230,0.85);
            font-family: Arial, sans-serif;
            letter-spacing: 4px;
            text-decoration: none;
            text-transform: uppercase;
            background: rgba(255,255,255,0.06);
            box-shadow:
                0 0 18px rgba(255,255,255,0.18),
                0 0 36px rgba(168,85,247,0.28);
        }

        .button:hover {
            background: rgba(255,255,255,0.14);
        }

        .links {
            margin-top: 46px;
            font-family: Arial, sans-serif;
        }

        .links a {
            margin: 0 20px;
            text-decoration: none;
            letter-spacing: 4px;
            font-size: 13px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 56px;
                letter-spacing: 5px;
            }

            h2 {
                font-size: 12px;
                letter-spacing: 4px;
            }

            p {
                font-size: 11px;
                letter-spacing: 3px;
            }

            .button {
                padding: 15px 30px;
                font-size: 11px;
            }

            .piece {
                width: 230px !important;
                height: 230px !important;
            }
        }
    </style>
</head>

<body>

    <div class="background">
        <div class="piece"><span></span></div>
        <div class="piece"><span></span></div>
        <div class="piece"><span></span></div>
        <div class="piece"><span></span></div>
        <div class="piece"><span></span></div>
    </div>

    <div class="content">
        <h1 class="chrome-text">Puzzled</h1>
        <h2 class="chrome-text">Not broken. Just different.</h2>
        <p class="chrome-text">Autism awareness streetwear.</p>

        <a class="button chrome-text" href="#">First Drop Coming Soon</a>

        <div class="links">
            <a class="chrome-text" href="#">Instagram</a>
            <a class="chrome-text" href="#">TikTok</a>
        </div>
    </div>

</body>
</html>
