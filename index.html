<!DOCTYPE html>
<html>
<head>
    <title>Puzzled</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;

            /* Animated gradient */
            background: linear-gradient(-45deg, #0a0a0a, #1a001f, #2b0033, #000000);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div>
        <h1>Puzzled</h1>
        <p>Autism awareness streetwear.</p>
        <p>Built for individuality.</p>
    </div>

</body>
</html>
