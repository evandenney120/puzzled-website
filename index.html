<!DOCTYPE html>
<html>
<head>
    <title>Puzzled</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #2b0033 0%, #050005 45%, #000000 100%);
            font-family: "Times New Roman", serif;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        .piece {
            position: absolute;
            top: -420px;
            width: 280px;
            height: 280px;

            background:
                linear-gradient(135deg,
                    #ffffff 0%,
                    #6e6e6e 18%,
                    #f8f8f8 35%,
                    #202020 50%,
                    #dcdcdc 68%,
                    #ffffff 82%,
                    #5a5a5a 100%);

            clip-path: path("M 60 20 C 85 20 95 40 86 58 C 80 72 92 84 108 74 C 130 60 155 75 155 100 C 155 125 130 140 108 126 C 92 116 80 128 86 142 C 95 160 85 180 60 180 L 20 180 L 20 140 C 20 118 45 110 58 126 C 68 138 84 130 78 114 C 68 90 82 68 108 74 C 124 78 132 62 118 52 C 100 38 108 20 132 20 L 180 20 L 180 60 C 180 82 155 90 142 74 C 132 62 116 70 122 86 C 132 110 118 132 92 126 C 76 122 68 138 82 148 C 100 162 92 180 68 180 L 20 180 L 20 20 Z");

            transform-style: preserve-3d;
            box-shadow:
                inset -18px -18px 35px rgba(0,0,0,0.65),
                inset 18px 18px 35px rgba(255,255,255,0.75),
                0 0 30px rgba(255,255,255,0.4),
                0 0 70px rgba(168,85,247,0.5);

            animation: fall3d linear infinite;
            opacity: 0.78;
        }

        .piece::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(75deg,
                    transparent 0%,
                    rgba(255,255,255,0.75) 28%,
                    transparent 45%,
                    rgba(255,255,255,0.35) 60%,
                    transparent 100%);
            animation: chromeShine 5s ease-in-out infinite;
        }

        .piece::after {
            content: "";
            position: absolute;
            inset: 8px;
            border: 2px solid rgba(255,255,255,0.28);
            border-radius: 28px;
            opacity: 0.5;
        }

        .piece:nth-child(1) { left: 2%;  width: 300px; height: 300px; animation-duration: 34s; }
        .piece:nth-child(2) { left: 18%; width: 340px; height: 340px; animation-duration: 42s; animation-delay: 4s; }
        .piece:nth-child(3) { left: 36%; width: 290px; height: 290px; animation-duration: 38s; animation-delay: 7s; }
        .piece:nth-child(4) { left: 53%; width: 360px; height: 360px; animation-duration: 47s; animation-delay: 2s; }
        .piece:nth-child(5) { left: 72%; width: 320px; height: 320px; animation-duration: 40s; animation-delay: 5s; }
        .piece:nth-child(6) { left: 86%; width: 350px; height: 350px; animation-duration: 45s; animation-delay: 9s; }

        @keyframes fall3d {
            0% {
                transform: translateY(-450px) rotateX(20deg) rotateY(0deg) rotateZ(0deg);
            }
            50% {
                transform: translateY(55vh) rotateX(180deg) rotateY(220deg) rotateZ(90deg);
            }
            100% {
                transform: translateY(130vh) rotateX(360deg) rotateY(420deg) rotateZ(180deg);
            }
        }

        @keyframes chromeShine {
            0%, 100% {
                transform: translateX(-80%);
                opacity: 0.25;
            }
            50% {
                transform: translateX(80%);
                opacity: 0.75;
            }
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        .chrome-text {
            color: transparent;
            background: linear-gradient(
                120deg,
                #ffffff 0%,
                #bfbfbf 20%,
                #ffffff 40%,
                #6e6e6e 60%,
                #ffffff 80%,
                #a0a0a0 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
        }

        h1 {
            font-size: 100px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-weight: 400;
            text-shadow:
                0 0 8px rgba(255,255,255,0.4),
                0 0 18px rgba(168,85,247,0.35);
        }

        h2 {
            margin-top: 20px;
            font-family: Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        p {
            margin-top: 35px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .button {
            margin-top: 45px;
            padding: 18px 55px;
            border: 1px solid #cfcfcf;
            font-family: Arial, sans-serif;
            letter-spacing: 4px;
            text-decoration: none;
            text-transform: uppercase;
            background: rgba(255,255,255,0.05);
        }

        .links {
            margin-top: 50px;
            font-family: Arial, sans-serif;
        }

        .links a {
            margin: 0 20px;
            text-decoration: none;
            letter-spacing: 4px;
            font-size: 13px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 55px;
            }

            .piece {
                width: 190px !important;
                height: 190px !important;
            }
        }
    </style>
</head>

<body>

    <div class="background">
        <div class="piece"></div>
        <div class="piece"></div>
        <div class="piece"></div>
        <div class="piece"></div>
        <div class="piece"></div>
        <div class="piece"></div>
    </div>

    <div class="content">
        <h1 class="chrome-text">Puzzled</h1>
        <h2 class="chrome-text">Not broken. Just different.</h2>
        <p class="chrome-text">Autism awareness streetwear.</p>

        <a class="button chrome-text" href="#">First Drop Coming Soon</a>

        <div class="links">
            <a class="chrome-text" href="#">Instagram</a>
            <a class="chrome-text" href="#">TikTok</a>
        </div>
    </div>

</body>
</html>
