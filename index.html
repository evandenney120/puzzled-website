<!DOCTYPE html>
<html>
<head>
    <title>Puzzled</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;

            /* Animated gradient background */
            background: linear-gradient(-45deg, #0a0a0a, #1a001f, #2b0033, #000000);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            opacity: 0.8;
        }

        p {
            font-size: 20px;
            opacity: 0.8;
        }

        .links a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .links a:hover {
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div>
        <h1>Puzzled</h1>
<img src="https://via.placeholder.com/400x300" style="width: 300px; margin-top: 20px; border-radius: 10px;">
        <h2>Not broken. Just different.</h2>

        <p>Autism awareness streetwear.</p>

        <p style="margin-top: 40px;">First drop coming soon.</p>

        <div class="links" style="margin-top: 30px;">
            <a href="#">Instagram</a>
            <a href="#">TikTok</a>
        </div>
    </div>

</body>
</html>
