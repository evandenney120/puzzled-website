<!DOCTYPE html>
<html>
<head>
    <title>Puzzled</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 45%, rgba(115, 0, 160, 0.45), transparent 32%),
                linear-gradient(135deg, #000000 0%, #09000d 45%, #1b0026 100%);
            font-family: "Times New Roman", serif;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            perspective: 1200px;
        }

        .jigsaw {
            position: absolute;
            top: -420px;
            width: 420px;
            height: 420px;
            opacity: 0.75;
            animation: fall3d linear infinite;
            filter:
                drop-shadow(0 0 18px rgba(255,255,255,0.35))
                drop-shadow(0 0 55px rgba(168,85,247,0.45));
        }

        .jigsaw svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .jigsaw:nth-child(1) {
            left: -6%;
            width: 430px;
            height: 430px;
            animation-duration: 32s;
            animation-delay: 0s;
        }

        .jigsaw:nth-child(2) {
            left: 15%;
            width: 500px;
            height: 500px;
            animation-duration: 40s;
            animation-delay: -9s;
        }

        .jigsaw:nth-child(3) {
            left: 38%;
            width: 420px;
            height: 420px;
            animation-duration: 36s;
            animation-delay: -17s;
        }

        .jigsaw:nth-child(4) {
            left: 60%;
            width: 540px;
            height: 540px;
            animation-duration: 46s;
            animation-delay: -5s;
        }

        .jigsaw:nth-child(5) {
            left: 82%;
            width: 460px;
            height: 460px;
            animation-duration: 42s;
            animation-delay: -22s;
        }

        @keyframes fall3d {
            0% {
                transform: translateY(-320px) rotateX(15deg) rotateY(0deg) rotateZ(0deg);
            }

            100% {
                transform: translateY(140vh) rotateX(260deg) rotateY(360deg) rotateZ(160deg);
            }
        }

        .content {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 35px;
            background: rgba(0,0,0,0.16);
        }

        .chrome-text {
            color: transparent;
            background: linear-gradient(
                120deg,
                #ffffff 0%,
                #d7d7d7 16%,
                #777777 31%,
                #ffffff 48%,
                #5e5e5e 64%,
                #f4f4f4 82%,
                #a6a6a6 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
        }

        h1 {
            font-size: 110px;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 400;
            line-height: 1;
            text-shadow:
                0 0 2px rgba(255,255,255,0.65),
                0 0 14px rgba(168,85,247,0.45);
        }

        h2 {
            margin-top: 22px;
            font-family: Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 7px;
            text-transform: uppercase;
            font-weight: 400;
        }

        p {
            margin-top: 34px;
            font-family: Arial, sans-serif;
            font-size: 15px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .drop-box {
            margin-top: 46px;
            padding: 20px 60px;
            border: 1px solid rgba(230,230,230,0.9);
            border-radius: 14px;
            font-family: Arial, sans-serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.02));
            box-shadow:
                inset 0 0 18px rgba(255,255,255,0.08),
                0 0 22px rgba(255,255,255,0.18),
                0 0 44px rgba(168,85,247,0.3);
        }

        .links {
            margin-top: 46px;
            font-family: Arial, sans-serif;
        }

        .links a {
            margin: 0 20px;
            text-decoration: none;
            letter-spacing: 4px;
            font-size: 13px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 56px;
                letter-spacing: 5px;
            }

            h2 {
                font-size: 12px;
                letter-spacing: 4px;
            }

            p {
                font-size: 11px;
                letter-spacing: 3px;
            }

            .drop-box {
                padding: 16px 28px;
                font-size: 11px;
            }

            .jigsaw {
                width: 260px !important;
                height: 260px !important;
            }
        }
    </style>
</head>
