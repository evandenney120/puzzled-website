<!DOCTYPE html>
<html>
<head>
    <title>Puzzled</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: "Times New Roman", serif;
            background: radial-gradient(circle at center, #2b0033 0%, #050005 45%, #000000 100%);
        }

        /* BACKGROUND LAYER */
        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .puzzle {
            position: absolute;
            top: -400px;
            line-height: 1;
            color: transparent;

            /* CHROME LOOK */
            background: linear-gradient(
                120deg,
                #ffffff 0%,
                #8a8a8a 15%,
                #f7f7f7 30%,
                #3f3f3f 45%,
                #dcdcdc 60%,
                #ffffff 75%,
                #6b6b6b 100%
            );
            -webkit-background-clip: text;
            background-clip: text;

            /* Glow but not too blurry */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5))
                    drop-shadow(0 0 30px rgba(160,60,255,0.5));

            animation: fall linear infinite;
            opacity: 0.65;
        }

        /* MUCH BIGGER PIECES */
        .puzzle:nth-child(1) { left: 2%;  font-size: 260px; animation: fall 32s linear infinite; }
        .puzzle:nth-child(2) { left: 18%; font-size: 300px; animation: fall 40s linear infinite; }
        .puzzle:nth-child(3) { left: 35%; font-size: 240px; animation: fall 36s linear infinite; }
        .puzzle:nth-child(4) { left: 52%; font-size: 320px; animation: fall 45s linear infinite; }
        .puzzle:nth-child(5) { left: 68%; font-size: 270px; animation: fall 38s linear infinite; }
        .puzzle:nth-child(6) { left: 82%; font-size: 310px; animation: fall 42s linear infinite; }
        .puzzle:nth-child(7) { left: 45%; font-size: 280px; animation: fall 50s linear infinite; }
        .puzzle:nth-child(8) { left: 75%; font-size: 250px; animation: fall 47s linear infinite; }

        @keyframes fall {
            0% {
                transform: translateY(-400px) rotate(0deg);
            }
            100% {
                transform: translateY(130vh) rotate(360deg);
            }
        }

        /* CONTENT LAYER (ON TOP) */
        .content {
            position: relative;
            z-index: 2; /* ensures text is ABOVE puzzle pieces */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        /* CLEAN CHROME TEXT (NO BLUR) */
        .chrome-text {
            color: transparent;
            background: linear-gradient(
                120deg,
                #ffffff 0%,
                #bfbfbf 20%,
                #ffffff 40%,
                #6e6e6e 60%,
                #ffffff 80%,
                #a0a0a0 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
        }

        h1 {
            font-size: 100px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-weight: 400;

            /* SHARP glow (not blurry) */
            text-shadow: 
                0 0 8px rgba(255,255,255,0.4),
                0 0 18px rgba(168,85,247,0.35);
        }

        h2 {
            margin-top: 20px;
            font-family: Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        p {
            margin-top: 35px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .button {
            margin-top: 45px;
            padding: 18px 55px;
            border: 1px solid #cfcfcf;
            font-family: Arial, sans-serif;
            letter-spacing: 4px;
            text-decoration: none;
            text-transform: uppercase;
            background: rgba(255,255,255,0.05);
        }

        .button:hover {
            background: rgba(255,255,255,0.12);
        }

        .links {
            margin-top: 50px;
            font-family: Arial, sans-serif;
        }

        .links a {
            margin: 0 20px;
            text-decoration: none;
            letter-spacing: 4px;
            font-size: 13px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            h1 { font-size: 55px; }
        }
    </style>
</head>

<body>

    <div class="background">
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
    </div>

    <div class="content">
        <h1 class="chrome-text">Puzzled</h1>
        <h2 class="chrome-text">Not broken. Just different.</h2>
        <p class="chrome-text">Autism awareness streetwear.</p>

        <a class="button chrome-text" href="#">First Drop Coming Soon</a>

        <div class="links">
            <a class="chrome-text" href="#">Instagram</a>
            <a class="chrome-text" href="#">TikTok</a>
        </div>
    </div>

</body>
</html>
