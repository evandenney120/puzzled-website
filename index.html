<!DOCTYPE html>
<html>
<head>
    <title>Puzzled</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: "Times New Roman", serif;
            background: radial-gradient(circle at center, #2b0033 0%, #050005 45%, #000000 100%);
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .puzzle {
            position: absolute;
            top: -220px;
            font-size: 145px;
            line-height: 1;
            color: transparent;

            /* Chrome effect */
            background: linear-gradient(
                120deg,
                #ffffff 0%,
                #8f8f8f 18%,
                #f5f5f5 35%,
                #4a4a4a 50%,
                #dcdcdc 65%,
                #ffffff 80%,
                #6b6b6b 100%
            );
            -webkit-background-clip: text;
            background-clip: text;

            filter: drop-shadow(0 0 10px rgba(255,255,255,0.7))
                    drop-shadow(0 0 25px rgba(160,60,255,0.7));

            animation: fall linear infinite;
            opacity: 0.9;
        }

        .puzzle:nth-child(1) {
            left: 3%;
            animation-duration: 24s;
            animation-delay: 0s;
            font-size: 180px;
        }

        .puzzle:nth-child(2) {
            left: 17%;
            animation-duration: 31s;
            animation-delay: 4s;
            font-size: 150px;
        }

        .puzzle:nth-child(3) {
            left: 32%;
            animation-duration: 27s;
            animation-delay: 8s;
            font-size: 170px;
        }

        .puzzle:nth-child(4) {
            left: 47%;
            animation-duration: 35s;
            animation-delay: 2s;
            font-size: 155px;
        }

        .puzzle:nth-child(5) {
            left: 61%;
            animation-duration: 29s;
            animation-delay: 6s;
            font-size: 190px;
        }

        .puzzle:nth-child(6) {
            left: 76%;
            animation-duration: 33s;
            animation-delay: 3s;
            font-size: 160px;
        }

        .puzzle:nth-child(7) {
            left: 88%;
            animation-duration: 26s;
            animation-delay: 10s;
            font-size: 185px;
        }

        .puzzle:nth-child(8) {
            left: 41%;
            animation-duration: 38s;
            animation-delay: 13s;
            font-size: 145px;
        }

        @keyframes fall {
            0% {
                transform: translateY(-250px) rotate(0deg);
            }
            100% {
                transform: translateY(125vh) rotate(360deg);
            }
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.28);
        }

        .chrome-text {
            color: transparent;
            background: linear-gradient(
                120deg,
                #ffffff 0%,
                #777777 15%,
                #f7f7f7 30%,
                #3f3f3f 45%,
                #d9d9d9 60%,
                #ffffff 75%,
                #8a8a8a 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow:
                0 0 10px rgba(255,255,255,0.45),
                0 0 30px rgba(168,85,247,0.45);
        }

        h1 {
            font-size: 90px;
            letter-spacing: 8px;
            font-weight: 400;
            text-transform: uppercase;
        }

        h2 {
            margin-top: 20px;
            font-family: Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 8px;
            font-weight: 300;
            text-transform: uppercase;
        }

        p {
            margin-top: 35px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .button {
            margin-top: 45px;
            padding: 18px 55px;
            border: 1px solid #cfcfcf;
            font-family: Arial, sans-serif;
            letter-spacing: 5px;
            text-decoration: none;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.06);
            box-shadow:
                0 0 18px rgba(255,255,255,0.25),
                0 0 30px rgba(168,85,247,0.25);
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .links {
            margin-top: 50px;
            font-family: Arial, sans-serif;
        }

        .links a {
            margin: 0 20px;
            text-decoration: none;
            letter-spacing: 4px;
            font-size: 13px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .puzzle {
                font-size: 110px;
            }

            h1 {
                font-size: 52px;
                letter-spacing: 4px;
            }

            h2 {
                font-size: 13px;
                letter-spacing: 4px;
            }

            p {
                font-size: 12px;
                letter-spacing: 3px;
            }

            .button {
                padding: 15px 30px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="background">
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
        <div class="puzzle">🧩</div>
    </div>

    <div class="content">
        <h1 class="chrome-text">Puzzled</h1>
        <h2 class="chrome-text">Not broken. Just different.</h2>
        <p class="chrome-text">Autism awareness streetwear.</p>

        <a class="button chrome-text" href="#">First Drop Coming Soon</a>

        <div class="links">
            <a class="chrome-text" href="#">Instagram</a>
            <a class="chrome-text" href="#">TikTok</a>
        </div>
    </div>

</body>
</html>
